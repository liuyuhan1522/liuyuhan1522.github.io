<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人聊天室</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            background: #f5f7fa;
        }

        /* 侧边栏 - 频道列表 */
        .sidebar {
            width: 220px;
            background: #2c3e50;
            color: #fff;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid #34495e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-tag {
            font-size: 11px;
            background: #f39c12;
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .channel-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #bdc3c7;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .channel-item:hover {
            background: #34495e;
            color: #fff;
        }
        .channel-item.active {
            background: #1677ff;
            color: #fff;
        }
        .channel-item .name-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
        }
        .channel-item .name-wrap::before {
            content: '#';
            opacity: 0.7;
            flex-shrink: 0;
        }
        .channel-item .lock-icon {
            font-size: 12px;
            opacity: 0.8;
        }
        .channel-item .manage-btn {
            opacity: 0;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .channel-item:hover .manage-btn {
            opacity: 1;
        }
        .create-channel-wrap {
            padding: 12px;
            border-top: 1px solid #34495e;
        }
        .create-channel-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            background: #27ae60;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .create-channel-btn:hover {
            background: #2ecc71;
        }

        /* 聊天主区域 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .header {
            padding: 14px 20px;
            background: #fff;
            border-bottom: 1px solid #e5e6eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header .title {
            font-weight: 600;
            font-size: 16px;
            color: #1d2129;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .title::before {
            content: '#';
            color: #86909c;
        }
        .header .my-name {
            font-size: 14px;
            color: #86909c;
        }
        #messages {
            flex: 1;
            padding: 18px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 72%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .message .name {
            font-size: 12px;
            color: #86909c;
            padding: 0 8px;
        }
        .message .bubble {
            padding: 9px 13px;
            border-radius: 12px;
            line-height: 1.45;
            font-size: 15px;
            word-break: break-word;
        }
        .message.other {
            align-self: flex-start;
        }
        .message.other .bubble {
            background: #fff;
            border-bottom-left-radius: 3px;
            color: #1d2129;
        }
        .message.self {
            align-self: flex-end;
        }
        .message.self .bubble {
            background: #1677ff;
            color: #fff;
            border-bottom-right-radius: 3px;
        }
        .status {
            text-align: center;
            color: #c9cdd4;
            font-size: 13px;
            margin: 4px 0;
        }
        .input-bar {
            padding: 14px 20px;
            background: #fff;
            border-top: 1px solid #e5e6eb;
            display: flex;
            gap: 10px;
        }
        #message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e5e6eb;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        #message-input:focus {
            border-color: #1677ff;
        }
        #send-btn {
            padding: 0 20px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background: #4096ff;
        }
        #send-btn:disabled {
            background: #c9cdd4;
            cursor: not-allowed;
        }

        /* 昵称登录弹窗 */
        .login-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .login-box {
            background: #fff;
            padding: 32px 28px;
            border-radius: 12px;
            width: 92%;
            max-width: 360px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .login-box h2 {
            text-align: center;
            color: #1d2129;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-item {
            margin-bottom: 14px;
        }
        .form-item input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e5e6eb;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-item input:focus {
            border-color: #1677ff;
        }
        .admin-check-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 14px;
            font-size: 13px;
            color: #666;
        }
        #enter-btn {
            width: 100%;
            padding: 11px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #enter-btn:hover {
            background: #4096ff;
        }
        #enter-btn:disabled {
            background: #99c2ff;
            cursor: not-allowed;
        }

        /* 创建频道弹窗 */
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-mask.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            padding: 24px;
            border-radius: 10px;
            width: 92%;
            max-width: 400px;
        }
        .modal-box h3 {
            margin-bottom: 18px;
            color: #1d2129;
            font-size: 18px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
            font-size: 14px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .tip-text {
            font-size: 12px;
            color: #999;
            margin-top: -8px;
            margin-bottom: 14px;
        }
        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btns button {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .cancel-btn {
            background: #f0f0f0;
            color: #666;
        }
        .confirm-btn {
            background: #1677ff;
            color: #fff;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                width: 180px;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧频道栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <span>频道列表</span>
            <span class="admin-tag" id="admin-tag" style="display:none;">管理员</span>
        </div>
        <div class="channel-list" id="channel-list"></div>
        <div class="create-channel-wrap" id="create-channel-wrap" style="display:none;">
            <button class="create-channel-btn" id="create-channel-btn">+ 新建频道</button>
        </div>
    </div>

    <!-- 右侧聊天区域 -->
    <div class="chat-container">
        <div class="header">
            <div class="title" id="current-channel-title">大厅</div>
            <div class="my-name" id="my-name">未登录</div>
        </div>

        <div id="messages">
            <div class="status">正在连接聊天室...</div>
        </div>

        <div class="input-bar">
            <input type="text" id="message-input" placeholder="输入消息..." disabled>
            <button id="send-btn" disabled>发送</button>
        </div>
    </div>

    <!-- 昵称登录弹窗 -->
    <div class="login-mask" id="login-mask">
        <div class="login-box">
            <h2>进入聊天室</h2>
            <div class="form-item">
                <input type="text" id="name-input" placeholder="请输入你的昵称">
            </div>
            <div class="admin-check-wrap">
                <input type="checkbox" id="admin-check">
                <label for="admin-check">管理员登录</label>
            </div>
            <div class="form-item" id="admin-pass-wrap" style="display:none;">
                <input type="password" id="admin-pass-input" placeholder="请输入管理员密码">
            </div>
            <button id="enter-btn">进入</button>
        </div>
    </div>

    <!-- 创建频道弹窗 -->
    <div class="modal-mask" id="create-modal">
        <div class="modal-box">
            <h3>新建频道</h3>
            <div class="form-item">
                <input type="text" id="new-channel-name" placeholder="请输入频道名称">
            </div>
            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="channel-type" value="public" checked>
                    <span>公开频道（所有人可见）</span>
                </label>
            </div>
            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="channel-type" value="private">
                    <span>私有频道（仅白名单可见）</span>
                </label>
            </div>
            <div class="form-item" id="whitelist-wrap" style="display:none;">
                <input type="text" id="whitelist-input" placeholder="白名单昵称，多个用逗号分隔">
            </div>
            <div class="tip-text">示例：张三,李四,王五</div>
            <div class="modal-btns">
                <button class="cancel-btn" id="cancel-create">取消</button>
                <button class="confirm-btn" id="confirm-create">创建</button>
            </div>
        </div>
    </div>

    <script>
        // 等待页面DOM完全加载后再执行所有逻辑
        document.addEventListener('DOMContentLoaded', function() {
            // ========== 配置项 ==========
            const CHANNEL_ID = 'FzHaHy8c1zFNyfE0';
            const ADMIN_PASSWORD = 'admin123';

            // ========== DOM元素 ==========
            const loginMask = document.getElementById('login-mask');
            const nameInput = document.getElementById('name-input');
            const adminCheck = document.getElementById('admin-check');
            const adminPassWrap = document.getElementById('admin-pass-wrap');
            const adminPassInput = document.getElementById('admin-pass-input');
            const enterBtn = document.getElementById('enter-btn');
            const adminTag = document.getElementById('admin-tag');
            const myNameEl = document.getElementById('my-name');
            const messagesEl = document.getElementById('messages');
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const channelListEl = document.getElementById('channel-list');
            const currentChannelTitle = document.getElementById('current-channel-title');
            const createChannelWrap = document.getElementById('create-channel-wrap');
            const createChannelBtn = document.getElementById('create-channel-btn');
            const createModal = document.getElementById('create-modal');
            const newChannelName = document.getElementById('new-channel-name');
            const whitelistWrap = document.getElementById('whitelist-wrap');
            const whitelistInput = document.getElementById('whitelist-input');
            const cancelCreate = document.getElementById('cancel-create');
            const confirmCreate = document.getElementById('confirm-create');

            // ========== 全局变量 ==========
            let myName = '';
            let isAdmin = false;
            let drone = null;
            let currentRoom = null;
            let currentChannel = '大厅';
            let allChannels = [
                { name: '大厅', type: 'public', whitelist: [], creator: 'system' }
            ];

            // ========== 初始化事件绑定 ==========
            // 管理员勾选切换
            adminCheck.addEventListener('change', function() {
                adminPassWrap.style.display = adminCheck.checked ? 'block' : 'none';
            });

            // 频道类型切换
            document.querySelectorAll('input[name="channel-type"]').forEach(function(radio) {
                radio.addEventListener('change', function() {
                    whitelistWrap.style.display = this.value === 'private' ? 'block' : 'none';
                });
            });

            // 打开创建弹窗
            createChannelBtn.addEventListener('click', function() {
                createModal.classList.add('show');
                newChannelName.value = '';
                whitelistInput.value = '';
                document.querySelector('input[value="public"]').checked = true;
                whitelistWrap.style.display = 'none';
            });

            // 取消创建
            cancelCreate.addEventListener('click', function() {
                createModal.classList.remove('show');
            });

            // 确认创建
            confirmCreate.addEventListener('click', createChannel);

            // 登录回车
            nameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') enterChat();
            });
            adminPassInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') enterChat();
            });

            // 发送消息
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') sendMessage();
            });

            // 进入按钮点击
            enterBtn.addEventListener('click', enterChat);

            // ========== 核心功能函数 ==========
            // 登录进入聊天室
            function enterChat() {
                const name = nameInput.value.trim();
                if (!name) {
                    alert('请输入昵称');
                    return;
                }

                // 管理员校验
                if (adminCheck.checked) {
                    const pass = adminPassInput.value.trim();
                    if (pass !== ADMIN_PASSWORD) {
                        alert('管理员密码错误');
                        return;
                    }
                    isAdmin = true;
                    adminTag.style.display = 'inline-block';
                    createChannelWrap.style.display = 'block';
                }

                // 禁用按钮防止重复点击
                enterBtn.disabled = true;
                enterBtn.textContent = '正在进入...';

                myName = name;
                myNameEl.textContent = '我：' + myName;

                // 连接Scaledrone
                try {
                    drone = new Scaledrone(CHANNEL_ID);
                } catch (e) {
                    alert('聊天室连接初始化失败，请检查网络');
                    enterBtn.disabled = false;
                    enterBtn.textContent = '进入';
                    return;
                }
                
                drone.on('open', function(error) {
                    if (error) {
                        alert('连接失败：' + error.message);
                        enterBtn.disabled = false;
                        enterBtn.textContent = '进入';
                        return;
                    }

                    // 连接成功，关闭登录弹窗
                    loginMask.style.display = 'none';
                    messagesEl.innerHTML = '';
                    addStatus('已连接到聊天室');

                    // 订阅系统房间，同步频道数据
                    const systemRoom = drone.subscribe('system_room');
                    systemRoom.on('open', function() {
                        // 请求同步最新频道列表
                        drone.publish({
                            room: 'system_room',
                            message: {
                                type: 'request_sync',
                                from: myName
                            }
                        });
                    });

                    // 监听系统消息
                    systemRoom.on('message', function(msg) {
                        handleSystemMessage(msg);
                    });

                    // 默认加入大厅频道
                    switchChannel('大厅');
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                    messageInput.focus();
                });

                drone.on('close', function() {
                    addStatus('连接已断开，请刷新页面重试');
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                });

                drone.on('error', function(error) {
                    alert('连接出错：' + error.message);
                    enterBtn.disabled = false;
                    enterBtn.textContent = '进入';
                });
            }

            // 处理系统房间消息
            function handleSystemMessage(msg) {
                const data = msg.data;
                if (msg.clientId === drone.clientId) return;

                switch(data.type) {
                    case 'request_sync':
                        if (isAdmin) {
                            drone.publish({
                                room: 'system_room',
                                message: {
                                    type: 'sync_channels',
                                    channels: allChannels
                                }
                            });
                        }
                        break;
                    
                    case 'sync_channels':
                        allChannels = data.channels;
                        renderChannelList();
                        const hasPermission = checkChannelPermission(currentChannel);
                        if (!hasPermission) {
                            switchChannel('大厅');
                            addStatus('你已被移出当前频道，已切换到大厅');
                        }
                        break;

                    case 'add_channel':
                        const exist = allChannels.find(function(c) { return c.name === data.channel.name; });
                        if (!exist) {
                            allChannels.push(data.channel);
                            renderChannelList();
                        }
                        break;
                    
                    case 'delete_channel':
                        allChannels = allChannels.filter(function(c) { return c.name !== data.channelName; });
                        renderChannelList();
                        if (currentChannel === data.channelName) {
                            switchChannel('大厅');
                            addStatus('频道 ' + data.channelName + ' 已被删除，已切换到大厅');
                        }
                        break;
                }
            }

            // 创建频道
            function createChannel() {
                const name = newChannelName.value.trim();
                if (!name) {
                    alert('请输入频道名称');
                    return;
                }

                const exist = allChannels.find(function(c) { return c.name === name; });
                if (exist) {
                    alert('该频道已存在');
                    return;
                }

                const type = document.querySelector('input[name="channel-type"]:checked').value;
                let whitelist = [];
                if (type === 'private') {
                    const whitelistStr = whitelistInput.value.trim();
                    if (!whitelistStr) {
                        alert('私有频道请填写白名单');
                        return;
                    }
                    whitelist = whitelistStr.split(/[,，]/).map(function(item) { return item.trim(); }).filter(function(item) { return item; });
                    if (!whitelist.includes(myName)) {
                        whitelist.push(myName);
                    }
                }

                const newChannel = {
                    name: name,
                    type: type,
                    whitelist: whitelist,
                    creator: myName
                };

                allChannels.push(newChannel);
                createModal.classList.remove('show');
                
                drone.publish({
                    room: 'system_room',
                    message: {
                        type: 'add_channel',
                        channel: newChannel
                    }
                });

                renderChannelList();
                switchChannel(name);
            }

            // 校验频道权限
            function checkChannelPermission(channelName) {
                const channel = allChannels.find(function(c) { return c.name === channelName; });
                if (!channel) return false;
                if (channel.type === 'public') return true;
                return channel.whitelist.includes(myName);
            }

            // 渲染频道列表
            function renderChannelList() {
                channelListEl.innerHTML = '';
                const visibleChannels = allChannels.filter(function(channel) {
                    return checkChannelPermission(channel.name);
                });

                visibleChannels.forEach(function(channel) {
                    const item = document.createElement('div');
                    item.className = 'channel-item' + (channel.name === currentChannel ? ' active' : '');
                    
                    item.innerHTML = `
                        <div class="name-wrap">
                            <span>${channel.name}</span>
                            ${channel.type === 'private' ? '<span class="lock-icon">🔒</span>' : ''}
                        </div>
                        ${isAdmin ? '<span class="manage-btn" data-name="' + channel.name + '">管理</span>' : ''}
                    `;

                    item.addEventListener('click', function(e) {
                        if (e.target.classList.contains('manage-btn')) return;
                        switchChannel(channel.name);
                    });

                    const manageBtn = item.querySelector('.manage-btn');
                    if (manageBtn) {
                        manageBtn.addEventListener('click', function() {
                            openManageModal(channel);
                        });
                    }

                    channelListEl.appendChild(item);
                });
            }

            // 频道管理弹窗
            function openManageModal(channel) {
                const action = confirm('频道管理：' + channel.name + '\n\n点击确定删除该频道\n点击取消取消操作');
                if (action) {
                    allChannels = allChannels.filter(function(c) { return c.name !== channel.name; });
                    drone.publish({
                        room: 'system_room',
                        message: {
                            type: 'delete_channel',
                            channelName: channel.name
                        }
                    });
                    renderChannelList();
                    if (currentChannel === channel.name) {
                        switchChannel('大厅');
                    }
                    addStatus('已删除频道：' + channel.name);
                }
            }

            // 切换频道
            function switchChannel(channelName) {
                if (channelName === currentChannel && currentRoom) return;
                
                if (!checkChannelPermission(channelName)) {
                    alert('你没有权限进入该频道');
                    return;
                }

                if (currentRoom) {
                    drone.unsubscribe('room_' + currentChannel);
                }

                currentChannel = channelName;
                currentChannelTitle.textContent = channelName;
                renderChannelList();

                messagesEl.innerHTML = '';
                addStatus('已切换到 #' + channelName + ' 频道');

                currentRoom = drone.subscribe('room_' + channelName);
                currentRoom.on('open', function(error) {
                    if (error) {
                        addStatus('加入频道失败：' + error.message);
                    }
                });

                currentRoom.on('message', function(msg) {
                    if (msg.clientId !== drone.clientId) {
                        const data = msg.data;
                        addMessage(data.name, data.text, 'other');
                    }
                });
            }

            // 发送消息
            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text || !drone) return;
                
                drone.publish({
                    room: 'room_' + currentChannel,
                    message: {
                        name: myName,
                        text: text
                    }
                });
                
                addMessage(myName, text, 'self');
                messageInput.value = '';
            }

            // 添加消息
            function addMessage(name, text, type) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + type;
                msgDiv.innerHTML = `
                    <div class="name">${name}</div>
                    <div class="bubble">${text}</div>
                `;
                messagesEl.appendChild(msgDiv);
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            // 添加状态提示
            function addStatus(text) {
                const statusDiv = document.createElement('div');
                statusDiv.className = 'status';
                statusDiv.textContent = text;
                messagesEl.appendChild(statusDiv);
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            // 页面加载完成后自动聚焦昵称输入框
            nameInput.focus();
        });
    </script>
</body>
</html>
