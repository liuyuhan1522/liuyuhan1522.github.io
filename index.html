<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人聊天室</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
        }
        /* 昵称登录弹窗 */
        .login-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .login-box {
            background: #fff;
            padding: 32px 28px;
            border-radius: 12px;
            width: 92%;
            max-width: 360px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .login-box h2 {
            text-align: center;
            color: #1d2129;
            margin-bottom: 20px;
            font-size: 20px;
        }
        #name-input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e5e6eb;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        #name-input:focus {
            border-color: #1677ff;
        }
        #enter-btn {
            width: 100%;
            padding: 11px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #enter-btn:hover {
            background: #4096ff;
        }

        /* 聊天主界面 */
        .header {
            padding: 14px 20px;
            background: #fff;
            border-bottom: 1px solid #e5e6eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header .title {
            font-weight: 600;
            font-size: 16px;
            color: #1d2129;
        }
        .header .my-name {
            font-size: 14px;
            color: #86909c;
        }
        #messages {
            flex: 1;
            padding: 18px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 72%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .message .name {
            font-size: 12px;
            color: #86909c;
            padding: 0 8px;
        }
        .message .bubble {
            padding: 9px 13px;
            border-radius: 12px;
            line-height: 1.45;
            font-size: 15px;
            word-break: break-word;
        }
        .message.other {
            align-self: flex-start;
        }
        .message.other .bubble {
            background: #fff;
            border-bottom-left-radius: 3px;
            color: #1d2129;
        }
        .message.self {
            align-self: flex-end;
        }
        .message.self .bubble {
            background: #1677ff;
            color: #fff;
            border-bottom-right-radius: 3px;
        }
        .status {
            text-align: center;
            color: #c9cdd4;
            font-size: 13px;
            margin: 4px 0;
        }
        .input-bar {
            padding: 14px 20px;
            background: #fff;
            border-top: 1px solid #e5e6eb;
            display: flex;
            gap: 10px;
        }
        #message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e5e6eb;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        #message-input:focus {
            border-color: #1677ff;
        }
        #send-btn {
            padding: 0 20px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background: #4096ff;
        }
        #send-btn:disabled {
            background: #c9cdd4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- 昵称登录弹窗 -->
    <div class="login-mask" id="login-mask">
        <div class="login-box">
            <h2>进入聊天室</h2>
            <input type="text" id="name-input" placeholder="请输入你的昵称">
            <button id="enter-btn">进入</button>
        </div>
    </div>

    <!-- 聊天主界面 -->
    <div class="header">
        <div class="title">多人聊天室</div>
        <div class="my-name" id="my-name">未登录</div>
    </div>

    <div id="messages">
        <div class="status">连接中...</div>
    </div>

    <div class="input-bar">
        <input type="text" id="message-input" placeholder="输入消息..." disabled>
        <button id="send-btn" disabled>发送</button>
    </div>

    <script>
        const loginMask = document.getElementById('login-mask');
        const nameInput = document.getElementById('name-input');
        const enterBtn = document.getElementById('enter-btn');
        const myNameEl = document.getElementById('my-name');
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        let myName = '';
        let drone = null;
        let room = null;

        // 已预置你的 Channel ID
        const CHANNEL_ID = 'FzHaHy8c1zFNyfE0';

        // 进入聊天室
        function enterChat() {
            const name = nameInput.value.trim();
            if (!name) {
                alert('请输入昵称');
                return;
            }
            myName = name;
            myNameEl.textContent = '我：' + myName;
            loginMask.style.display = 'none';

            // 连接 Scaledrone
            drone = new Scaledrone(CHANNEL_ID);
            
            drone.on('open', error => {
                if (error) {
                    addStatus('连接失败：' + error.message);
                    return;
                }
                addStatus('已连接到聊天室');
                
                // 加入公共房间
                room = drone.subscribe('public_chat');
                room.on('open', error => {
                    if (error) {
                        addStatus('加入房间失败：' + error.message);
                        return;
                    }
                    addStatus('欢迎进入聊天室');
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                    messageInput.focus();
                });

                // 【修正】正确监听消息事件，事件名是 message，不是 data
                room.on('message', message => {
                    // 过滤自己发送的消息
                    if (message.clientId !== drone.clientId) {
                        const data = message.data;
                        addMessage(data.name, data.text, 'other');
                    }
                });
            });

            drone.on('close', () => {
                addStatus('连接已断开');
                messageInput.disabled = true;
                sendBtn.disabled = true;
            });

            drone.on('error', error => {
                addStatus('出错了：' + error.message);
            });
        }

        enterBtn.addEventListener('click', enterChat);
        nameInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') enterChat();
        });

        // 发送消息
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !drone) return;
            
            drone.publish({
                room: 'public_chat',
                message: {
                    name: myName,
                    text: text
                }
            });
            
            addMessage(myName, text, 'self');
            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });

        // 添加消息到界面
        function addMessage(name, text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `
                <div class="name">${name}</div>
                <div class="bubble">${text}</div>
            `;
            messagesEl.appendChild(msgDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // 添加状态提示
        function addStatus(text) {
            const statusDiv = document.createElement('div');
            statusDiv.className = 'status';
            statusDiv.textContent = text;
            messagesEl.appendChild(statusDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
    </script>
</body>
</html>
