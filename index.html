<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人聊天室</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            background: #f5f7fa;
        }

        /* 侧边栏 - 频道列表 */
        .sidebar {
            width: 220px;
            background: #2c3e50;
            color: #fff;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid #34495e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-tag {
            font-size: 11px;
            background: #f39c12;
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .channel-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #bdc3c7;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .channel-item:hover {
            background: #34495e;
            color: #fff;
        }
        .channel-item.active {
            background: #1677ff;
            color: #fff;
        }
        .channel-item .name-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
        }
        .channel-item .name-wrap::before {
            content: '#';
            opacity: 0.7;
            flex-shrink: 0;
        }
        .channel-item .lock-icon {
            font-size: 12px;
            opacity: 0.8;
        }
        .channel-item .manage-btn {
            opacity: 0;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .channel-item:hover .manage-btn {
            opacity: 1;
        }
        .create-channel-wrap {
            padding: 12px;
            border-top: 1px solid #34495e;
        }
        .create-channel-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            background: #27ae60;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .create-channel-btn:hover {
            background: #2ecc71;
        }

        /* 聊天主区域 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .header {
            padding: 14px 20px;
            background: #fff;
            border-bottom: 1px solid #e5e6eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header .title {
            font-weight: 600;
            font-size: 16px;
            color: #1d2129;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .title::before {
            content: '#';
            color: #86909c;
        }
        .header .my-name {
            font-size: 14px;
            color: #86909c;
        }
        #messages {
            flex: 1;
            padding: 18px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 72%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .message .name {
            font-size: 12px;
            color: #86909c;
            padding: 0 8px;
        }
        .message .bubble {
            padding: 9px 13px;
            border-radius: 12px;
            line-height: 1.45;
            font-size: 15px;
            word-break: break-word;
        }
        .message.other {
            align-self: flex-start;
        }
        .message.other .bubble {
            background: #fff;
            border-bottom-left-radius: 3px;
            color: #1d2129;
        }
        .message.self {
            align-self: flex-end;
        }
        .message.self .bubble {
            background: #1677ff;
            color: #fff;
            border-bottom-right-radius: 3px;
        }
        .status {
            text-align: center;
            color: #c9cdd4;
            font-size: 13px;
            margin: 4px 0;
        }
        .input-bar {
            padding: 14px 20px;
            background: #fff;
            border-top: 1px solid #e5e6eb;
            display: flex;
            gap: 10px;
        }
        #message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e5e6eb;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        #message-input:focus {
            border-color: #1677ff;
        }
        #message-input:disabled {
            background: #f5f7fa;
            cursor: not-allowed;
        }
        #send-btn {
            padding: 0 20px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background: #4096ff;
        }
        #send-btn:disabled {
            background: #c9cdd4;
            cursor: not-allowed;
        }

        /* 昵称登录弹窗 */
        .login-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .login-box {
            background: #fff;
            padding: 32px 28px;
            border-radius: 12px;
            width: 92%;
            max-width: 360px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .login-box h2 {
            text-align: center;
            color: #1d2129;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-item {
            margin-bottom: 14px;
        }
        .form-item input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e5e6eb;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-item input:focus {
            border-color: #1677ff;
        }
        .form-label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        .admin-check-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 14px;
            font-size: 13px;
            color: #666;
        }
        #enter-btn {
            width: 100%;
            padding: 11px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #enter-btn:hover {
            background: #4096ff;
        }
        #enter-btn:disabled {
            background: #99c2ff;
            cursor: not-allowed;
        }

        /* 通用弹窗 */
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-mask.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            padding: 24px;
            border-radius: 10px;
            width: 92%;
            max-width: 420px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            margin-bottom: 18px;
            color: #1d2129;
            font-size: 18px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
            font-size: 14px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .tip-text {
            font-size: 12px;
            color: #999;
            margin-top: -6px;
            margin-bottom: 10px;
        }

        /* 用户选择与标签 */
        .user-select-wrap {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .user-select-wrap select,
        .user-select-wrap input {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid #e5e6eb;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }
        .user-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 30px;
            padding: 4px;
            border: 1px dashed #e5e6eb;
            border-radius: 6px;
        }
        .user-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            background: #e6f4ff;
            color: #1677ff;
            border-radius: 12px;
            font-size: 12px;
        }
        .user-tag.readonly {
            background: #fff7e6;
            color: #fa8c16;
        }
        .user-tag .remove-tag {
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            opacity: 0.7;
        }
        .user-tag .remove-tag:hover {
            opacity: 1;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btns button {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .cancel-btn {
            background: #f0f0f0;
            color: #666;
        }
        .cancel-btn:hover {
            background: #f5f5f5;
        }
        .confirm-btn {
            background: #1677ff;
            color: #fff;
        }
        .confirm-btn:hover {
            background: #4096ff;
        }
        .danger-btn {
            background: #ff4d4f;
            color: #fff;
        }
        .danger-btn:hover {
            background: #ff7875;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                width: 180px;
            }
            .user-select-wrap {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧频道栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <span>频道列表</span>
            <span class="admin-tag" id="admin-tag" style="display:none;">管理员</span>
        </div>
        <div class="channel-list" id="channel-list"></div>
        <div class="create-channel-wrap" id="create-channel-wrap" style="display:none;">
            <button class="create-channel-btn" id="create-channel-btn">+ 新建频道</button>
        </div>
    </div>

    <!-- 右侧聊天区域 -->
    <div class="chat-container">
        <div class="header">
            <div class="title" id="current-channel-title">大厅</div>
            <div class="my-name" id="my-name">未登录</div>
        </div>

        <div id="messages">
            <div class="status">正在连接聊天室...</div>
        </div>

        <div class="input-bar">
            <input type="text" id="message-input" placeholder="输入消息..." disabled>
            <button id="send-btn" disabled>发送</button>
        </div>
    </div>

    <!-- 昵称登录弹窗 -->
    <div class="login-mask" id="login-mask">
        <div class="login-box">
            <h2>进入聊天室</h2>
            <div class="form-item">
                <input type="text" id="name-input" placeholder="请输入你的昵称">
            </div>
            <div class="admin-check-wrap">
                <input type="checkbox" id="admin-check">
                <label for="admin-check">管理员登录</label>
            </div>
            <div class="form-item" id="admin-pass-wrap" style="display:none;">
                <input type="password" id="admin-pass-input" placeholder="请输入管理员密码">
            </div>
            <button id="enter-btn">进入</button>
        </div>
    </div>

    <!-- 创建频道弹窗 -->
    <div class="modal-mask" id="create-modal">
        <div class="modal-box">
            <h3>新建频道</h3>
            <div class="form-item">
                <label class="form-label">频道名称</label>
                <input type="text" id="new-channel-name" placeholder="请输入频道名称">
            </div>
            
            <div class="form-item">
                <label class="form-label">频道类型</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="channel-type" value="public" checked>
                        <span>公开频道（所有人可见可发言）</span>
                    </label>
                </div>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="channel-type" value="private">
                        <span>私有频道（仅名单内用户可见）</span>
                    </label>
                </div>
            </div>

            <div class="form-item" id="whitelist-section" style="display:none;">
                <label class="form-label">白名单用户（可进入频道并发言）</label>
                <div class="user-select-wrap">
                    <select id="add-whitelist-select">
                        <option value="">选择在线用户添加</option>
                    </select>
                    <input type="text" id="whitelist-input" placeholder="手动输入昵称回车添加">
                </div>
                <div class="user-tags" id="whitelist-tags"></div>
                <div class="tip-text">点击标签右侧 × 可移除用户</div>
            </div>

            <div class="form-item" id="readonly-section" style="display:none;">
                <label class="form-label">只读名单用户（仅旁观，无法发言）</label>
                <div class="user-select-wrap">
                    <select id="add-readonly-select">
                        <option value="">选择在线用户添加</option>
                    </select>
                    <input type="text" id="readonly-input" placeholder="手动输入昵称回车添加">
                </div>
                <div class="user-tags" id="readonly-tags"></div>
            </div>

            <div class="modal-btns">
                <button class="cancel-btn" id="cancel-create">取消</button>
                <button class="confirm-btn" id="confirm-create">创建频道</button>
            </div>
        </div>
    </div>

    <!-- 频道管理弹窗 -->
    <div class="modal-mask" id="manage-modal">
        <div class="modal-box">
            <h3>频道管理：<span id="manage-channel-name"></span></h3>
            
            <div class="form-item">
                <label class="form-label">白名单用户（可进入并发言）</label>
                <div class="user-select-wrap">
                    <select id="manage-whitelist-select">
                        <option value="">选择在线用户添加</option>
                    </select>
                    <input type="text" id="manage-whitelist-input" placeholder="手动输入昵称回车添加">
                </div>
                <div class="user-tags" id="manage-whitelist-tags"></div>
            </div>

            <div class="form-item">
                <label class="form-label">只读名单用户（仅旁观，无法发言）</label>
                <div class="user-select-wrap">
                    <select id="manage-readonly-select">
                        <option value="">选择在线用户添加</option>
                    </select>
                    <input type="text" id="manage-readonly-input" placeholder="手动输入昵称回车添加">
                </div>
                <div class="user-tags" id="manage-readonly-tags"></div>
            </div>

            <div class="modal-btns">
                <button class="danger-btn" id="delete-channel-btn">删除频道</button>
                <button class="cancel-btn" id="cancel-manage">关闭</button>
                <button class="confirm-btn" id="save-manage">保存设置</button>
            </div>
        </div>
    </div>

    <script>
        // 等待页面DOM完全加载后执行
        document.addEventListener('DOMContentLoaded', function() {
            // ========== 配置项 ==========
            const CHANNEL_ID = 'FzHaHy8c1zFNyfE0';
            const ADMIN_PASSWORD = 'admin123'; // 管理员密码可在此修改

            // ========== DOM元素 ==========
            const loginMask = document.getElementById('login-mask');
            const nameInput = document.getElementById('name-input');
            const adminCheck = document.getElementById('admin-check');
            const adminPassWrap = document.getElementById('admin-pass-wrap');
            const adminPassInput = document.getElementById('admin-pass-input');
            const enterBtn = document.getElementById('enter-btn');
            const adminTag = document.getElementById('admin-tag');
            const myNameEl = document.getElementById('my-name');
            const messagesEl = document.getElementById('messages');
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const channelListEl = document.getElementById('channel-list');
            const currentChannelTitle = document.getElementById('current-channel-title');
            const createChannelWrap = document.getElementById('create-channel-wrap');
            const createChannelBtn = document.getElementById('create-channel-btn');
            const createModal = document.getElementById('create-modal');
            const newChannelName = document.getElementById('new-channel-name');
            const whitelistSection = document.getElementById('whitelist-section');
            const readonlySection = document.getElementById('readonly-section');
            const cancelCreate = document.getElementById('cancel-create');
            const confirmCreate = document.getElementById('confirm-create');
            const manageModal = document.getElementById('manage-modal');
            const manageChannelName = document.getElementById('manage-channel-name');
            const cancelManage = document.getElementById('cancel-manage');
            const saveManage = document.getElementById('save-manage');
            const deleteChannelBtn = document.getElementById('delete-channel-btn');

            // ========== 全局变量 ==========
            let myName = '';
            let isAdmin = false;
            let drone = null;
            let currentRoom = null;
            let currentChannel = '大厅';
            let onlineUsers = []; // 在线用户列表
            let currentManageChannel = null; // 当前编辑的频道
            let allChannels = [
                { name: '大厅', type: 'public', whitelist: [], readonlyList: [], creator: 'system' }
            ];

            // ========== 初始化事件绑定 ==========
            // 管理员登录勾选切换
            adminCheck.addEventListener('change', function() {
                adminPassWrap.style.display = adminCheck.checked ? 'block' : 'none';
            });

            // 频道类型切换
            document.querySelectorAll('input[name="channel-type"]').forEach(function(radio) {
                radio.addEventListener('change', function() {
                    const isPrivate = this.value === 'private';
                    whitelistSection.style.display = isPrivate ? 'block' : 'none';
                    readonlySection.style.display = isPrivate ? 'block' : 'none';
                });
            });

            // 打开创建频道弹窗
            createChannelBtn.addEventListener('click', function() {
                newChannelName.value = '';
                document.querySelector('input[value="public"]').checked = true;
                whitelistSection.style.display = 'none';
                readonlySection.style.display = 'none';
                // 清空标签
                document.getElementById('whitelist-tags').innerHTML = '';
                document.getElementById('readonly-tags').innerHTML = '';
                // 默认添加自己到白名单
                addUserTag(myName, 'whitelist-tags');
                // 更新下拉选项
                updateUserSelects();
                createModal.classList.add('show');
            });

            // 取消创建
            cancelCreate.addEventListener('click', function() {
                createModal.classList.remove('show');
            });

            // 确认创建频道
            confirmCreate.addEventListener('click', createChannel);

            // 创建弹窗-白名下拉选择
            document.getElementById('add-whitelist-select').addEventListener('change', function() {
                if (this.value) {
                    addUserTag(this.value, 'whitelist-tags');
                    this.value = '';
                }
            });

            // 创建弹窗-白名手动输入
            document.getElementById('whitelist-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (this.value.trim()) {
                        addUserTag(this.value.trim(), 'whitelist-tags');
                        this.value = '';
                    }
                }
            });

            // 创建弹窗-只读下拉选择
            document.getElementById('add-readonly-select').addEventListener('change', function() {
                if (this.value) {
                    addUserTag(this.value, 'readonly-tags');
                    this.value = '';
                }
            });

            // 创建弹窗-只读手动输入
            document.getElementById('readonly-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (this.value.trim()) {
                        addUserTag(this.value.trim(), 'readonly-tags');
                        this.value = '';
                    }
                }
            });

            // 管理弹窗-关闭
            cancelManage.addEventListener('click', function() {
                manageModal.classList.remove('show');
                currentManageChannel = null;
            });

            // 管理弹窗-保存设置
            saveManage.addEventListener('click', saveChannelSettings);

            // 管理弹窗-删除频道
            deleteChannelBtn.addEventListener('click', function() {
                if (!currentManageChannel) return;
                if (confirm('确定删除频道 ' + currentManageChannel.name + ' 吗？所有用户将被自动移出。')) {
                    deleteChannel(currentManageChannel.name);
                    manageModal.classList.remove('show');
                    currentManageChannel = null;
                }
            });

            // 管理弹窗-白名下拉
            document.getElementById('manage-whitelist-select').addEventListener('change', function() {
                if (this.value) {
                    addUserTag(this.value, 'manage-whitelist-tags');
                    this.value = '';
                }
            });

            // 管理弹窗-白名输入
            document.getElementById('manage-whitelist-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (this.value.trim()) {
                        addUserTag(this.value.trim(), 'manage-whitelist-tags');
                        this.value = '';
                    }
                }
            });

            // 管理弹窗-只读下拉
            document.getElementById('manage-readonly-select').addEventListener('change', function() {
                if (this.value) {
                    addUserTag(this.value, 'manage-readonly-tags');
                    this.value = '';
                }
            });

            // 管理弹窗-只读输入
            document.getElementById('manage-readonly-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (this.value.trim()) {
                        addUserTag(this.value.trim(), 'manage-readonly-tags');
                        this.value = '';
                    }
                }
            });

            // 登录回车快捷进入
            nameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') enterChat();
            });
            adminPassInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') enterChat();
            });

            // 发送消息
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') sendMessage();
            });

            // 进入按钮点击
            enterBtn.addEventListener('click', enterChat);

            // ========== 核心功能函数 ==========
            // 登录进入聊天室
            function enterChat() {
                const name = nameInput.value.trim();
                if (!name) {
                    alert('请输入昵称');
                    return;
                }

                // 管理员校验
                if (adminCheck.checked) {
                    const pass = adminPassInput.value.trim();
                    if (pass !== ADMIN_PASSWORD) {
                        alert('管理员密码错误');
                        return;
                    }
                    isAdmin = true;
                    adminTag.style.display = 'inline-block';
                    createChannelWrap.style.display = 'block';
                }

                enterBtn.disabled = true;
                enterBtn.textContent = '正在连接...';
                myName = name;
                myNameEl.textContent = '我：' + myName;

                // 连接Scaledrone，携带昵称数据
                try {
                    drone = new Scaledrone(CHANNEL_ID, {
                        data: { name: myName }
                    });
                } catch (e) {
                    alert('聊天室初始化失败，请检查网络连接');
                    enterBtn.disabled = false;
                    enterBtn.textContent = '进入';
                    return;
                }
                
                drone.on('open', function(error) {
                    if (error) {
                        alert('连接失败：' + error.message);
                        enterBtn.disabled = false;
                        enterBtn.textContent = '进入';
                        return;
                    }

                    loginMask.style.display = 'none';
                    messagesEl.innerHTML = '';
                    addStatus('已连接到聊天室');

                    // 订阅observable系统房间（只有observable房间才能获取成员列表）
                    const systemRoom = drone.subscribe('observable-system_room');
                    
                    // 先绑定成员事件，再处理打开事件
                    systemRoom.on('members', function(members) {
                        // 提取所有在线用户昵称
                        onlineUsers = members
                            .map(function(m) { 
                                return m.clientData && m.clientData.name; 
                            })
                            .filter(function(name) { 
                                return name && name !== myName; // 排除自己
                            });
                        updateUserSelects();
                    });

                    systemRoom.on('member_join', function(member) {
                        const userName = member.clientData && member.clientData.name;
                        if (userName && userName !== myName && !onlineUsers.includes(userName)) {
                            onlineUsers.push(userName);
                            updateUserSelects();
                        }
                    });

                    systemRoom.on('member_leave', function(member) {
                        const userName = member.clientData && member.clientData.name;
                        if (userName) {
                            onlineUsers = onlineUsers.filter(function(u) { return u !== userName; });
                            updateUserSelects();
                        }
                    });

                    systemRoom.on('open', function(error) {
                        if (error) {
                            addStatus('系统房间连接失败');
                            return;
                        }
                        // 请求同步最新频道列表
                        drone.publish({
                            room: 'observable-system_room',
                            message: { type: 'request_sync', from: myName }
                        });
                    });

                    // 监听系统消息
                    systemRoom.on('message', function(msg) {
                        handleSystemMessage(msg);
                    });

                    // 默认加入大厅
                    switchChannel('大厅');
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                    messageInput.focus();
                });

                drone.on('close', function() {
                    addStatus('连接已断开，请刷新页面重试');
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                });

                drone.on('error', function(error) {
                    alert('连接出错：' + error.message);
                    enterBtn.disabled = false;
                    enterBtn.textContent = '进入';
                });
            }

            // 处理系统消息
            function handleSystemMessage(msg) {
                const data = msg.data;
                if (msg.clientId === drone.clientId) return;

                switch(data.type) {
                    case 'request_sync':
                        // 管理员回复同步
                        if (isAdmin) {
                            drone.publish({
                                room: 'observable-system_room',
                                message: { type: 'sync_channels', channels: allChannels }
                            });
                        }
                        break;
                    
                    case 'sync_channels':
                        allChannels = data.channels;
                        renderChannelList();
                        // 校验当前频道权限
                        if (!checkChannelPermission(currentChannel)) {
                            switchChannel('大厅');
                            addStatus('你已被移出当前频道，已切换到大厅');
                        }
                        checkReadonlyPermission();
                        break;

                    case 'add_channel':
                        const exist = allChannels.find(function(c) { return c.name === data.channel.name; });
                        if (!exist) {
                            allChannels.push(data.channel);
                            renderChannelList();
                        }
                        break;
                    
                    case 'update_channel':
                        const updateIdx = allChannels.findIndex(function(c) { return c.name === data.channel.name; });
                        if (updateIdx > -1) {
                            allChannels[updateIdx] = data.channel;
                        } else {
                            allChannels.push(data.channel);
                        }
                        renderChannelList();
                        // 当前频道更新时重新校验权限
                        if (currentChannel === data.channel.name) {
                            if (!checkChannelPermission(currentChannel)) {
                                switchChannel('大厅');
                                addStatus('你已被移出该频道，已切换到大厅');
                            } else {
                                checkReadonlyPermission();
                                addStatus('频道设置已更新');
                            }
                        }
                        break;

                    case 'delete_channel':
                        allChannels = allChannels.filter(function(c) { return c.name !== data.channelName; });
                        renderChannelList();
                        if (currentChannel === data.channelName) {
                            switchChannel('大厅');
                            addStatus('频道 ' + data.channelName + ' 已被删除，已切换到大厅');
                        }
                        break;
                }
            }

            // 创建频道
            function createChannel() {
                const name = newChannelName.value.trim();
                if (!name) {
                    alert('请输入频道名称');
                    return;
                }

                const exist = allChannels.find(function(c) { return c.name === name; });
                if (exist) {
                    alert('该频道已存在');
                    return;
                }

                const type = document.querySelector('input[name="channel-type"]:checked').value;
                let whitelist = [];
                let readonlyList = [];

                if (type === 'private') {
                    whitelist = getTagUsers('whitelist-tags');
                    readonlyList = getTagUsers('readonly-tags');
                    // 确保创建者在白名单
                    if (!whitelist.includes(myName)) {
                        whitelist.push(myName);
                    }
                }

                const newChannel = {
                    name: name,
                    type: type,
                    whitelist: whitelist,
                    readonlyList: readonlyList,
                    creator: myName
                };

                allChannels.push(newChannel);
                createModal.classList.remove('show');
                
                // 广播新增频道
                drone.publish({
                    room: 'observable-system_room',
                    message: { type: 'add_channel', channel: newChannel }
                });

                renderChannelList();
                switchChannel(name);
                addStatus('频道 ' + name + ' 创建成功');
            }

            // 保存频道管理设置
            function saveChannelSettings() {
                if (!currentManageChannel) return;

                const newWhitelist = getTagUsers('manage-whitelist-tags');
                const newReadonly = getTagUsers('manage-readonly-tags');

                // 确保管理员自己在白名单
                if (!newWhitelist.includes(myName)) {
                    newWhitelist.push(myName);
                }

                // 移除同时在两个名单里的用户（白名单优先）
                const finalReadonly = newReadonly.filter(function(u) {
                    return !newWhitelist.includes(u);
                });

                // 更新本地数据
                const idx = allChannels.findIndex(function(c) { return c.name === currentManageChannel.name; });
                if (idx > -1) {
                    allChannels[idx].whitelist = newWhitelist;
                    allChannels[idx].readonlyList = finalReadonly;
                }

                // 广播更新
                drone.publish({
                    room: 'observable-system_room',
                    message: { type: 'update_channel', channel: allChannels[idx] }
                });

                renderChannelList();
                if (currentChannel === currentManageChannel.name) {
                    checkReadonlyPermission();
                }

                alert('设置已保存并同步');
                manageModal.classList.remove('show');
                currentManageChannel = null;
            }

            // 删除频道
            function deleteChannel(channelName) {
                allChannels = allChannels.filter(function(c) { return c.name !== channelName; });
                drone.publish({
                    room: 'observable-system_room',
                    message: { type: 'delete_channel', channelName: channelName }
                });
                renderChannelList();
                if (currentChannel === channelName) {
                    switchChannel('大厅');
                }
            }

            // 打开频道管理弹窗
            function openManageModal(channel) {
                currentManageChannel = channel;
                manageChannelName.textContent = channel.name;

                // 填充白名单标签
                const whitelistContainer = document.getElementById('manage-whitelist-tags');
                whitelistContainer.innerHTML = '';
                channel.whitelist.forEach(function(username) {
                    addUserTag(username, 'manage-whitelist-tags');
                });

                // 填充只读名单标签
                const readonlyContainer = document.getElementById('manage-readonly-tags');
                readonlyContainer.innerHTML = '';
                if (channel.readonlyList && channel.readonlyList.length) {
                    channel.readonlyList.forEach(function(username) {
                        addUserTag(username, 'manage-readonly-tags');
                    });
                }

                updateUserSelects();
                manageModal.classList.add('show');
            }

            // 校验频道进入权限
            function checkChannelPermission(channelName) {
                const channel = allChannels.find(function(c) { return c.name === channelName; });
                if (!channel) return false;
                if (channel.type === 'public') return true;
                // 私有频道：白名单+只读名单都可进入
                const inWhite = channel.whitelist.includes(myName);
                const inReadonly = channel.readonlyList && channel.readonlyList.includes(myName);
                return inWhite || inReadonly;
            }

            // 校验只读权限，更新输入框状态
            function checkReadonlyPermission() {
                const channel = allChannels.find(function(c) { return c.name === currentChannel; });
                if (!channel) {
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                    return;
                }

                const isReadonly = channel.readonlyList && channel.readonlyList.includes(myName);
                messageInput.disabled = isReadonly;
                sendBtn.disabled = isReadonly;

                if (isReadonly) {
                    messageInput.placeholder = '你处于旁观模式，无法发送消息';
                } else {
                    messageInput.placeholder = '输入消息...';
                }
            }

            // 切换频道
            function switchChannel(channelName) {
                if (channelName === currentChannel && currentRoom) return;
                
                if (!checkChannelPermission(channelName)) {
                    alert('你没有权限进入该频道');
                    return;
                }

                // 取消旧房间订阅
                if (currentRoom) {
                    drone.unsubscribe('room_' + currentChannel);
                }

                currentChannel = channelName;
                currentChannelTitle.textContent = channelName;
                renderChannelList();

                messagesEl.innerHTML = '';
                addStatus('已切换到 #' + channelName + ' 频道');

                // 订阅新房间
                currentRoom = drone.subscribe('room_' + channelName);
                currentRoom.on('open', function(error) {
                    if (error) {
                        addStatus('加入频道失败：' + error.message);
                    }
                });

                currentRoom.on('message', function(msg) {
                    if (msg.clientId !== drone.clientId) {
                        const data = msg.data;
                        addMessage(data.name, data.text, 'other');
                    }
                });

                // 检查只读权限
                checkReadonlyPermission();
            }

            // 发送消息
            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text || !drone) return;

                // 只读权限二次校验
                const channel = allChannels.find(function(c) { return c.name === currentChannel; });
                if (channel && channel.readonlyList && channel.readonlyList.includes(myName)) {
                    addStatus('你处于旁观模式，无法发送消息');
                    return;
                }

                drone.publish({
                    room: 'room_' + currentChannel,
                    message: { name: myName, text: text }
                });

                addMessage(myName, text, 'self');
                messageInput.value = '';
            }

            // 渲染频道列表
            function renderChannelList() {
                channelListEl.innerHTML = '';
                const visibleChannels = allChannels.filter(function(channel) {
                    return checkChannelPermission(channel.name);
                });

                visibleChannels.forEach(function(channel) {
                    const item = document.createElement('div');
                    item.className = 'channel-item' + (channel.name === currentChannel ? ' active' : '');
                    
                    const isPrivate = channel.type === 'private';
                    item.innerHTML = `
                        <div class="name-wrap">
                            <span>${channel.name}</span>
                            ${isPrivate ? '<span class="lock-icon">🔒</span>' : ''}
                        </div>
                        ${isAdmin ? '<span class="manage-btn">管理</span>' : ''}
                    `;

                    // 切换频道
                    item.addEventListener('click', function(e) {
                        if (e.target.classList.contains('manage-btn')) return;
                        switchChannel(channel.name);
                    });

                    // 管理按钮
                    const manageBtn = item.querySelector('.manage-btn');
                    if (manageBtn) {
                        manageBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            openManageModal(channel);
                        });
                    }

                    channelListEl.appendChild(item);
                });
            }

            // ========== 工具函数 ==========
            // 添加用户标签
            function addUserTag(username, containerId) {
                const container = document.getElementById(containerId);
                // 去重
                const existing = container.querySelectorAll('.user-tag span:first-child');
                for (let tag of existing) {
                    if (tag.textContent === username) return;
                }

                const tag = document.createElement('div');
                tag.className = 'user-tag' + (containerId.includes('readonly') ? ' readonly' : '');
                tag.innerHTML = `<span>${username}</span><span class="remove-tag">×</span>`;

                // 删除事件
                tag.querySelector('.remove-tag').addEventListener('click', function() {
                    tag.remove();
                });

                container.appendChild(tag);
            }

            // 获取标签内所有用户名
            function getTagUsers(containerId) {
                const container = document.getElementById(containerId);
                const spans = container.querySelectorAll('.user-tag span:first-child');
                return Array.from(spans).map(function(s) { return s.textContent; });
            }

            // 更新所有下拉选择框的在线用户选项
            function updateUserSelects() {
                const selectIds = [
                    'add-whitelist-select', 'add-readonly-select',
                    'manage-whitelist-select', 'manage-readonly-select'
                ];

                selectIds.forEach(function(id) {
                    const select = document.getElementById(id);
                    if (!select) return;
                    const currentVal = select.value;
                    // 保留默认选项
                    select.innerHTML = '<option value="">选择在线用户添加</option>';
                    // 添加在线用户
                    onlineUsers.forEach(function(username) {
                        const option = document.createElement('option');
                        option.value = username;
                        option.textContent = username;
                        select.appendChild(option);
                    });
                    select.value = currentVal;
                });
            }

            // 添加消息气泡
            function addMessage(name, text, type) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + type;
                msgDiv.innerHTML = `
                    <div class="name">${name}</div>
                    <div class="bubble">${text}</div>
                `;
                messagesEl.appendChild(msgDiv);
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            // 添加状态提示
            function addStatus(text) {
                const statusDiv = document.createElement('div');
                statusDiv.className = 'status';
                statusDiv.textContent = text;
                messagesEl.appendChild(statusDiv);
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            // 页面加载完成自动聚焦昵称输入框
            nameInput.focus();
        });
    </script>
</body>
</html>
